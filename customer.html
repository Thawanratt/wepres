<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Reservations</title>
    <link rel="stylesheet" href="customer.css"> <!-- เชื่อมโยง CSS ถ้ามี -->
</head>
<body>
    <!-- ปุ่มล็อกเอาต์ -->
    <div class="logout-container">
        <a href="index.html" class="logout">Logout</a>
    </div>
    <div class="container">
        <div class="header-back"><u>รายการการจองโต๊ะ</u></div>
        <!-- ส่วนที่จะแสดงข้อมูลการจองโต๊ะ -->
        <table id="restaurant-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Table ID</th>
                    <th>Customer Name</th>

                    <th>Time</th>
                    <th>Phone</th>

            </thead>
            <tbody id="restaurant"></tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="customer.js"></script>
